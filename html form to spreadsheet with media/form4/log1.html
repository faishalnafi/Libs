<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login | SMA Negeri 3 Kota Mojokerto</title>

  <!-- Import Bootstrap 4 untuk styling responsif dan komponen -->
  <link href="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" rel="stylesheet"/>

  <style>
    /* Background dan font utama halaman */
    body {
      background: #f2f6fb;
      font-family: 'Segoe UI', sans-serif;
    }

    /* Kartu login (form) */
    .login-card {
      max-width: 450px;
      margin: 80px auto;
      background: rgba(255, 255, 255, 0.85); /* glassmorphism effect */
      backdrop-filter: blur(10px); /* blur background */
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.1); /* shadow lembut */
      border-radius: 12px;
      padding: 30px;
    }

    /* Judul halaman login */
    .login-title {
      font-weight: 600;
      font-size: 1.3rem;
    }

    /* Subjudul di bawah nama sekolah */
    .login-subtitle {
      color: #555;
      font-size: 0.9rem;
    }

    /* Tombol login custom */
    .btn-login {
      background-color: #4f46e5;
      color: white;
    }

    /* Hover effect tombol */
    .btn-login:hover {
      background-color: #4338ca;
    }

    /* Footer */
    .footer {
      text-align: center;
      font-size: 0.8rem;
      margin-top: 30px;
      color: #666;
    }

    /* Gambar gelombang di bagian bawah */
    .wave {
      position: absolute;
      bottom: 0;
      width: 100%;
      opacity: 0.2;
    }
  </style>
</head>

<body>

<!-- Container utama Bootstrap -->
<div class="container">
  <!-- Card login -->
  <div class="login-card text-center">
    <!-- Logo -->
    <div>
      <img src="https://cdn-icons-png.flaticon.com/512/3135/3135755.png" width="60" alt="Logo" />
    </div>

    <!-- Judul dan Subjudul -->
    <div class="mt-3 login-title">SMA Negeri 3 Kota Mojokerto</div>
    <div class="login-subtitle">
      Sistem Pendaftaran Ulang Murid Baru<br>
      <a href="#">Tahun Pelajaran 2025/2026</a>
    </div>

    <!-- Form Login -->
    <form id="loginForm" class="mt-4">
      <!-- Input NISN -->
      <div class="form-group text-left">
        <label for="nisn">NISN</label>
        <input type="text" class="form-control" id="nisn" required />
      </div>

      <!-- Input Tanggal Lahir -->
      <div class="form-group text-left">
        <label for="tgl">Tanggal Lahir</label>
        <input type="date" class="form-control" id="tgl" required />
        <small class="form-text text-muted">
          Format tanggal sesuai dengan data pendaftaran
        </small>
      </div>

      <!-- Tombol Masuk -->
      <button type="submit" class="btn btn-login btn-block">Masuk</button>
    </form>
  </div>

  <!-- Footer -->
  <div class="footer">
    © 2024 SMA Negeri 3 Kota Mojokerto. Hak Cipta Dilindungi.
  </div>
</div>

<!-- Gambar gelombang dekoratif -->
<img class="wave" src="https://www.svgrepo.com/show/346184/wave-bottom.svg" alt="wave" />

<!-- Import jQuery untuk mempermudah DOM & event handling -->
<script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>

<!-- Import PapaParse untuk membaca CSV dari URL -->
<script src="https://cdn.jsdelivr.net/npm/papaparse@5.3.2/papaparse.min.js"></script>

<script>
  // URL CSV Google Sheets publik (berisi kolom: nisn, tgl-lahir)
  const csvURL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTyhcalvOtHzfw0-FneOSm20A2A7lLjt7QjRzSuHKwbFA1Bc-x9g_BR_sOgG0VmuvIMt9LBmTf0nOgp/pub?gid=177139897&single=true&output=csv";

  // Array penampung data siswa dari CSV
  let siswaData = [];

  // Load data CSV saat halaman dimuat
  Papa.parse(csvURL, {
    download: true, // ambil file dari internet
    header: true,   // membaca baris pertama sebagai nama kolom
    complete: function(results) {
      siswaData = results.data; // simpan hasil ke variabel global
    }
  });

  // Saat form login disubmit
  $('#loginForm').on('submit', function(e) {
    e.preventDefault(); // mencegah reload halaman

    // Ambil input dari user
    const nisn = $('#nisn').val().trim();
    const tglLahir = $('#tgl').val().trim(); // format: yyyy-mm-dd

    // Cari data di CSV yang cocok
    const found = siswaData.find(item =>
      item['nisn'] === nisn && item['tgl-lahir'] === tglLahir
    );

    // Jika ditemukan, redirect ke halaman tujuan
    if (found) {
      alert('Login berhasil!');
      window.location.href = "https://faishalnafi.com"; // redirect
    } else {
      // Jika gagal, tampilkan alert
      alert('Login gagal. Pastikan NISN dan Tanggal Lahir sesuai.');
    }
  });
</script>

</body>
</html>
